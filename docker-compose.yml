services:
  pipeline:
    build: .
    container_name: threatwatch-pipeline
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SITE_DOMAIN=${SITE_DOMAIN:-localhost:8098}
      - FEED_CUTOFF_DAYS=${FEED_CUTOFF_DAYS:-7}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
    volumes:
      - threatwatch-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/data/output/stats.json || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    command: ["python", "scripts/run_pipeline.py"]

  server:
    build: .
    container_name: threatwatch-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8098}
      - SITE_DOMAIN=${SITE_DOMAIN:-localhost:8098}
    ports:
      - "${PORT:-8098}:8098"
    volumes:
      - threatwatch-data:/app/data
    depends_on:
      - pipeline
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8098/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: ["python", "serve_threatwatch.py"]

volumes:
  threatwatch-data:

services:
  pipeline:
    build: .
    container_name: threatwatch-pipeline
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SITE_DOMAIN=${SITE_DOMAIN:-localhost:8098}
      - FEED_CUTOFF_DAYS=${FEED_CUTOFF_DAYS:-7}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
    volumes:
      - threatwatch-data:/app/data
    command: >
      sh -c '
        echo "Starting pipeline (initial run)..." &&
        python threatdigest_main.py;
        while true; do
          echo "Sleeping 600s until next run..." &&
          sleep 600 &&
          echo "Starting pipeline run at $$(date -u +%Y-%m-%dT%H:%M:%SZ)..." &&
          python threatdigest_main.py;
        done
      '

  server:
    build: .
    container_name: threatwatch-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=${PORT:-8098}
      - SITE_DOMAIN=${SITE_DOMAIN:-localhost:8098}
    ports:
      - "${PORT:-8098}:8098"
    volumes:
      - threatwatch-data:/app/data
    depends_on:
      - pipeline
    command: ["python", "serve_threatwatch.py"]

volumes:
  threatwatch-data:
